services:
  # --- BANCO DE DADOS (Para a Aplicação Java) ---
  db-app:
    env_file:
      - ./.env
      - ./secrets.env
    image: postgres:16-alpine
    container_name: auraskill-db-app
    restart: always
    environment:
      POSTGRES_USER: ${APP_DB_USER}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
      POSTGRES_DB: ${APP_DB_NAME}
    ports:
      - "${APP_DB_PORT}:${APP_DB_INTERNAL_PORT}"
    volumes:
      - ${DB_APP_VOL_PATH}:/var/lib/postgresql/data
    networks:
      - auraskill-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER} -d ${APP_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- BANCO DE DADOS (Para o Keycloak) ---
  db-keycloak:
    env_file:
      - ./.env
      - ./secrets.env
    image: postgres:16-alpine
    container_name: auraskill-db-keycloak
    restart: always
    environment:
      POSTGRES_USER: ${KC_DB_USER}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
      POSTGRES_DB: ${KC_DB_NAME}
    ports:
      - "${KC_DB_PORT}:${KC_DB_INTERNAL_PORT}"
    volumes:
      - ${DB_KC_VOL_PATH}:/var/lib/postgresql/data
    networks:
      - auraskill-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER} -d ${KC_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- BANCO DE DADOS (Para o SonarQube) ---
  db-sonarqube:
    env_file:
      - ./.env
      - ./secrets.env
    image: postgres:16-alpine
    container_name: auraskill-db-sonarqube
    restart: always
    environment:
      POSTGRES_USER: ${SONAR_DB_USER}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD}
      POSTGRES_DB: ${SONAR_DB_NAME}
    ports:
      - "${SONAR_DB_PORT}:${SONAR_DB_INTERNAL_PORT}"
    volumes:
      - ${DB_SONAR_VOL_PATH}:/var/lib/postgresql/data
    networks:
      - auraskill-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_DB_USER} -d ${SONAR_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- SERVIÇO KEYCLOAK ---
  keycloak:
    env_file:
      - ./.env
      - ./secrets.env
    image: quay.io/keycloak/keycloak:latest
    container_name: auraskill-keycloak
    restart: always
    command: start-dev --health-enabled=true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: ${KC_DB_URL}
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_URL: ${KC_HOSTNAME_URL}
    ports:
      - "${KC_PORT}:${KC_INTERNAL_PORT}"
    depends_on:
      db-keycloak:
        condition: service_healthy
    networks:
      - auraskill-network
    healthcheck:
      test: ["CMD", "/opt/keycloak/bin/kcadm.sh", "config", "credentials", "--server", "http://localhost:8080", "--realm", "master", "--user", "${KC_ADMIN_USER}", "--password", "${KC_ADMIN_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- SERVIÇO SONARQUBE ---
  sonarqube:
    env_file:
      - ./.env
      - ./secrets.env
    image: sonarqube:community
    container_name: auraskill-sonarqube
    restart: always
    environment:
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
      SONAR_JDBC_URL: jdbc:postgresql://auraskill-db-sonarqube:${SONAR_DB_INTERNAL_PORT}/${SONAR_DB_NAME}
    ports:
      - "${SONAR_PORT}:${SONAR_INTERNAL_PORT}"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - auraskill-sonar-data:/opt/sonarqube/data
      - auraskill-sonar-extensions:/opt/sonarqube/extensions
      - auraskill-sonar-logs:/opt/sonarqube/logs
    depends_on:
      db-sonarqube:
        condition: service_healthy
    networks:
      - auraskill-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${SONAR_INTERNAL_PORT}/api/system/status || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s

  # --- REDIS CACHE SERVER ---
  auraskill-redis:
    env_file:
      - ./.env
      - ./secrets.env
    image: redis:7-alpine
    container_name: auraskill-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT}:${REDIS_INTERNAL_PORT}"
    volumes:
      - ${REDIS_VOL_PATH}:/data
    networks:
      - auraskill-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- EUREKA SERVER ---
  aura-eureka:
    env_file:
      - ./.env
      - ./secrets.env
    build:
      context: ${AURA_EUREKA_PATH}
      dockerfile: Dockerfile
    container_name: auraskill-eureka
    restart: always
    ports:
      - "${EUREKA_PORT}:${EUREKA_INTERNAL_PORT}"
    environment:
      - SPRING_APPLICATION_NAME=${EUREKA_APP_NAME}
      - SERVER_PORT=${EUREKA_INTERNAL_PORT}
      - MANAGEMENT_ENDPOINT_HEALTH_SHOWDETAILS=always
      - spring.cloud.discovery.enabled=true
      - eureka.client.register-with-eureka=false
      - eureka.client.fetch-registry=false
      - server.address=0.0.0.0
    networks:
      - auraskill-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${EUREKA_INTERNAL_PORT}${EUREKA_HEALTH_ENDPOINT} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- BACKEND API (Spring Boot) ---
  auraskill-api:
    env_file:
      - ./.env
      - ./secrets.env
    build:
      context: ${AURA_API_PATH}
      dockerfile: Dockerfile
    container_name: auraskill-api
    restart: always
    ports:
      - "${API_PORT}:${API_INTERNAL_PORT}"
    environment:
      - SPRING_APPLICATION_NAME=${SPRING_APPLICATION_NAME}
      - SERVER_PORT=${API_PORT}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://auraskill-db-app:${APP_DB_INTERNAL_PORT}/${APP_DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${APP_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${APP_DB_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO}
      - SPRING_JPA_OPEN_IN_VIEW=${SPRING_JPA_OPEN_IN_VIEW}
      - SPRING_JPA_SHOW_SQL=${SPRING_JPA_SHOW_SQL}
      - SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL}
      - SPRING_FLYWAY_ENABLED=${SPRING_FLYWAY_ENABLED}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=${KEYCLOAK_ISSUER_URI}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://auraskill-eureka:${EUREKA_PORT}/eureka
    depends_on:
      db-app:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      auraskill-redis:
        condition: service_healthy
      aura-eureka:
        condition: service_healthy
    networks:
      - auraskill-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${API_INTERNAL_PORT}/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- API GATEWAY ---
  aura-gateway:
    env_file:
      - ./.env
      - ./secrets.env
    build:
      context: ${AURA_GATEWAY_PATH}
      dockerfile: Dockerfile
    container_name: auraskill-gateway
    restart: always
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_INTERNAL_PORT}"
    environment:
      - SPRING_APPLICATION_NAME=aura-gateway
      - SERVER_PORT=${GATEWAY_INTERNAL_PORT}
      - MANAGEMENT_ENDPOINT_HEALTH_SHOWDETAILS=always
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://auraskill-eureka:${EUREKA_PORT}/eureka
    depends_on:
      aura-eureka:
        condition: service_healthy
      auraskill-api:
        condition: service_healthy
    networks:
      - auraskill-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${GATEWAY_INTERNAL_PORT}/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- FRONTEND (Next.js) ---
  auraskill-frontend:
    env_file:
      - ./.env
      - ./secrets.env
    build:
      context: ${AURA_FRONT_PATH}
      dockerfile: Dockerfile
    container_name: auraskill-frontend
    restart: always
    ports:
      - "${FRONT_PORT}:${FRONT_INTERNAL_PORT}"
    environment:
      - NODE_ENV=production
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER_URI}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://auraskill-eureka:${EUREKA_PORT}/eureka
    depends_on:
      keycloak:
        condition: service_healthy
      auraskill-api:
        condition: service_healthy
      aura-eureka:
        condition: service_healthy
    networks:
      - auraskill-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${FRONT_INTERNAL_PORT}/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  auraskill-network:
    driver: bridge

# --- ESPECIFICAÇÃO DOS NAMED VOLUMES DO SONAR ---
volumes:
  auraskill-sonar-data:
  auraskill-sonar-extensions:
  auraskill-sonar-logs: