services:
  db-app:
    image: postgres:16-alpine
    container_name: auraskill-prod-db-app
    restart: always
    environment:
      POSTGRES_USER: ${APP_DB_USER}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
      POSTGRES_DB: ${APP_DB_NAME}
    ports:
      - "${APP_DB_PORT}:5432"
    networks:
      - auraskill-network

  # --- BANCO DE DADOS LOCAL (Para o Keycloak) ---
  db-keycloak:
    image: postgres:16-alpine
    container_name: auraskill-prod-db-keycloak
    restart: always
    environment:
      POSTGRES_USER: ${KC_DB_USER}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
      POSTGRES_DB: ${KC_DB_NAME}
    ports:
      - "${KC_DB_PORT}:5432"
    volumes:
      - ./data/keycloak-db:/var/lib/postgresql/data
    networks:
      - auraskill-network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: auraskill-prod-keycloak
    restart: always
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: ${KC_DB_URL}
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "${KC_PORT}:8080"
    depends_on:
      - db-keycloak
    networks:
      - auraskill-network

  auraskill-api:
    build:
      context: ../../aura-api
    container_name: auraskill-prod-api
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://auraskill-prod-db-app:5432/${APP_DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${APP_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${APP_DB_PASSWORD}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://localhost:8080/realms/auraskill
    ports:
      - "8081:8081"
    depends_on:
      - db-app
      - keycloak
    networks:
      - auraskill-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"

  auraskill-frontend:
    build:
      context: ../../aura-front
    container_name: auraskill-prod-frontend
    restart: always
    environment:
      - NODE_ENV=production
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_ISSUER=http://localhost:8080/realms/auraskill
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    depends_on:
      - keycloak
      - auraskill-api
    networks:
      - auraskill-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"

networks:
  auraskill-network:
    driver: bridge
