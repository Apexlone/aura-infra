name: Infra Deploy

on:
  push:
    branches:
      - main
      - hml

jobs:
  deploy:
    name: Deploy Infrastructure Base
    runs-on: self-hosted

    steps:
      # PASSO 1: Checkout com bloqueio de limpeza
      # O 'clean: false' é vital para evitar o erro EACCES: permission denied
      - name: Checkout Infra Code
        uses: actions/checkout@v4
        with:
          clean: false

      # PASSO 2: Deploy dos serviços base
      # Usamos caminhos absolutos para evitar confusão de diretórios no Runner
      - name: Deploy Infra Stack
        run: |
          docker compose \
            --env-file /home/guiassys/devtools/repos/aura-infra/docker/hml/.env \
            -f /home/guiassys/devtools/repos/aura-infra/docker/hml/docker-compose.yml \
            up -d db-app db-keycloak keycloak

      # PASSO 3: Limpeza de resíduos do Docker (Imagens órfãs)
      - name: Clean up
        run: docker image prune -f