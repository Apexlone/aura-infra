name: Infra Deploy

on:
  push:
    branches:
      - main
      - hml

jobs:
  deploy:
    name: Deploy Infrastructure Base
    runs-on: self-hosted

    steps:
      # Passo 1: Checkout do código
      # 'clean: false' evita que o Runner tente deletar arquivos que o Docker travou
      - name: Checkout Infra Code
        uses: actions/checkout@v4
        with:
          clean: false

      # Passo 2: Sobe apenas os serviços base (Bancos e Keycloak)
      # Agora o Docker Compose usará os caminhos absolutos para persistir os dados
      - name: Deploy Infra Stack
        run: |
          docker compose \
            --env-file /home/guiassys/devtools/repos/aura-infra/docker/hml/.env \
            -f /home/guiassys/devtools/repos/aura-infra/docker/hml/docker-compose.yml \
            up -d db-app db-keycloak keycloak

      # Passo 3: Limpeza de imagens suspensas
      - name: Clean up
        run: docker image prune -f