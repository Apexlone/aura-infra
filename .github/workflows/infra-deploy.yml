name: Infra Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Infrastructure Base
    runs-on: self-hosted

    steps:
      # Passo 1: Checkout do repositório aura-infra (Branch main)
      - name: Checkout Infra Code
        uses: actions/checkout@v4
        with:
          ref: main

      # Passo 2: Deploy da Infraestrutura Base
      - name: Deploy Infra Stack
        run: |
          docker compose \
            --env-file /home/guiassys/devtools/repos/aura-infra/docker/hml/.env \
            -f ${{ github.workspace }}/docker/hml/docker-compose.yml \
            up -d db-app db-keycloak keycloak auraskill-redis

      # Passo 3: Limpeza de imagens e builders órfãos para economizar espaço
      - name: Clean up
        run: |
          docker image prune -f
          docker builder prune -f