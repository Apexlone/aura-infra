name: Infra Deploy

on:
  push:
    branches:
      - hml
      - prd
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev, hml, prd)'
        required: true
        default: 'hml'
        type: choice
        options:
          - hml
          - prd

jobs:
  deploy:
    name: Deploy Infrastructure Base
    runs-on: self-hosted

    steps:
      # Passo 0: Determinar o ambiente com base no gatilho
      - name: Determine Environment
        id: set_environment
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ENVIRONMENT=${{ github.event.inputs.environment }}" >> "$GITHUB_ENV"
          else
            case "${{ github.ref_name }}" in
              "hml")
                echo "ENVIRONMENT=hml" >> "$GITHUB_ENV"
                ;;
              "prd")
                echo "ENVIRONMENT=prd" >> "$GITHUB_ENV"
                ;;
              *)
                echo "ENVIRONMENT=hml" >> "$GITHUB_ENV"
                ;;
            esac
          fi

      # Passo 1: Checkout dinâmico (Usa a branch que disparou a pipeline)
      - name: Checkout Infra Code
        uses: actions/checkout@v4

      # Passo 2: Criar o arquivo secrets.env dinamicamente
      - name: Create secrets.env file
        run: |
          echo "KC_DB_PASSWORD=${{ secrets.KC_DB_PASSWORD }}" >> docker/${{ env.ENVIRONMENT }}/secrets.env
          echo "KC_ADMIN_PASSWORD=${{ secrets.KC_ADMIN_PASSWORD }}" >> docker/${{ env.ENVIRONMENT }}/secrets.env
          echo "APP_DB_PASSWORD=${{ secrets.APP_DB_PASSWORD }}" >> docker/${{ env.ENVIRONMENT }}/secrets.env
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> docker/${{ env.ENVIRONMENT }}/secrets.env
          echo "KEYCLOAK_CLIENT_SECRET=${{ secrets.KEYCLOAK_CLIENT_SECRET }}" >> docker/${{ env.ENVIRONMENT }}/secrets.env
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> docker/${{ env.ENVIRONMENT }}/secrets.env
          echo "SONAR_DB_PASSWORD=${{ secrets.SONAR_DB_PASSWORD }}" >> docker/${{ env.ENVIRONMENT }}/secrets.env
          echo "MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}" >> docker/${{ env.ENVIRONMENT }}/secrets.env

      # Passo de Depuração: Verificar o arquivo .env
      - name: Debug .env file
        run: |
          echo "Listing contents of docker/${{ env.ENVIRONMENT }}/:"
          ls -la docker/${{ env.ENVIRONMENT }}/
          echo "Content of docker/${{ env.ENVIRONMENT }}/.env:"
          cat docker/${{ env.ENVIRONMENT }}/.env
        working-directory: ${{ github.workspace }}

      # Derrubar a infraestrutura anterior do ambiente
      - name: Tear Down Previous Infra Stack
        run: |
          docker compose \
            --env-file docker/${{ env.ENVIRONMENT }}/.env \
            --env-file docker/${{ env.ENVIRONMENT }}/secrets.env \
            -f docker/${{ env.ENVIRONMENT }}/docker-compose.yml \
            down --remove-orphans
        continue-on-error: true

      # Passo 3: Deploy da Infraestrutura Base
      - name: Deploy Infra Stack
        run: |
          docker compose \
            --env-file docker/${{ env.ENVIRONMENT }}/.env \
            --env-file docker/${{ env.ENVIRONMENT }}/secrets.env \
            -f docker/${{ env.ENVIRONMENT }}/docker-compose.yml \
            up -d db-app db-keycloak keycloak auraskill-redis db-sonarqube sonarqube minio

      # Passo 4: Limpeza do arquivo secrets.env temporário
      - name: Clean up secrets.env file
        if: always()
        run: rm -f docker/${{ env.ENVIRONMENT }}/secrets.env

      # Passo 5: Limpeza de imagens e builders órfãos
      - name: Clean up Docker resources
        run: |
          docker image prune -f
          docker builder prune -f